<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Calculator UI</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; padding: 1rem; background:#f6f9fc }
    .box { background: white; padding:1rem; border-radius:6px; max-width:420px; margin:1rem auto }
    input, select, button { font-size:1rem; padding:0.5rem; margin:0.25rem 0 }
    .row { display:flex; gap:0.5rem }
    .result { margin-top:1rem; padding:0.5rem; background:#efefef; border-radius:4px }
  </style>
</head>
<body>
  <div class="box">
    <h2>Calculator (web UI)</h2>
    <div>
      <label>Operation</label>
      <select id="op">
        <option value="add">Add (+)</option>
        <option value="sub">Subtract (-)</option>
        <option value="mul">Multiply (×)</option>
        <option value="div">Divide (÷)</option>
        <option value="mod">Modulo (%)</option>
        <option value="pow">Power (^)</option>
        <option value="sqrt">Square root (√)</option>
      </select>
    </div>

    <div id="operands" class="row">
      <input id="a" type="number" step="any" placeholder="Number A" />
      <input id="b" type="number" step="any" placeholder="Number B" />
    </div>

    <div>
      <button id="calc">Calculate</button>
      <button id="clear">Clear</button>
    </div>

    <div id="result" class="result" aria-live="polite">Result: —</div>
  </div>

  <script>
    const opEl = document.getElementById('op');
    const aEl = document.getElementById('a');
    const bEl = document.getElementById('b');
    const calcBtn = document.getElementById('calc');
    const clearBtn = document.getElementById('clear');
    const resultEl = document.getElementById('result');
    const operands = document.getElementById('operands');

    function updateUI() {
      if (opEl.value === 'sqrt') {
        bEl.style.display = 'none';
      } else {
        bEl.style.display = '';
      }
    }

    opEl.addEventListener('change', updateUI);
    updateUI();

    calcBtn.addEventListener('click', async () => {
      const op = opEl.value;
      const a = aEl.value === '' ? null : Number(aEl.value);
      const b = bEl.value === '' ? null : Number(bEl.value);

      const payload = { op, a, b };
      try {
        const res = await fetch('/api/calc', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        resultEl.textContent = 'Result: ' + data.result;
      } catch (err) {
        resultEl.textContent = 'Error: ' + err.message;
      }
    });

    clearBtn.addEventListener('click', () => {
      aEl.value = '';
      bEl.value = '';
      resultEl.textContent = 'Result: —';
    });
  </script>
</body>
</html>
